<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Social Icon hover: Teks</title>
        <link rel="stylesheet" href="font-icons/all.min.css">
        <link rel="stylesheet" href="font-icons/fontawesome.min.css">
        <link rel="stylesheet" type="text/css" href="Style.css">
    </head>
    <body>
        <div class="Inbox">
            <div class="button">
                <div class="icon"><i class="fa-brands fa-facebook-f"></i></div>
                <span>Facebook</span>
            </div>
            <div class="button">
               <div class="icon"><i class="fa-brands fa-twitter"></i></div>
                <span>Twitter</span>
            </div>
            <div class="button">
               <div class="icon"><i class="fa-brands fa-instagram"></i></div>
                <span>Instagram</span>
            </div>
            <div class="button">
               <div class="icon"><i class="fa-brands fa-github"></i></div>
                <span>Github</span>
            </div>
            <div class="button">
               <div class="icon"><i class="fa-brands fa-youtube"></i></div>
                <span>Youtube</span>
            </div>
        </div>
    </body>
</html>
