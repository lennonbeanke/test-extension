<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Form UI</title>
<base target="_blank">
</head>
<style>
  * {
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
  }

  /* Container */
  .container {
    background: white;
    padding: 40px 30px;
    border-radius: 16px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    animation: slideUp 0.5s ease-out;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Title */
  h2 {
    text-align: center;
    margin-bottom: 10px;
    color: #333;
    font-size: 28px;
  }

  .subtitle {
    text-align: center;
    color: #888;
    margin-bottom: 25px;
    font-size: 14px;
  }

  /* Progress Bar */
  .progress-container {
    background: #e0e0e0;
    height: 8px;
    border-radius: 5px;
    margin-bottom: 25px;
    overflow: hidden;
  }

  .progress-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #667eea, #764ba2);
    border-radius: 5px;
    transition: width 0.4s ease, background 0.3s ease;
  }

  .progress-bar.complete {
    background: linear-gradient(90deg, #667eea, #764ba2);
  }

  /* Progress Label */
  .progress-label {
    text-align: center;
    font-size: 12px;
    color: #666;
    margin-bottom: 5px;
  }

  /* Form Group */
  .form-group {
    margin-bottom: 18px;
    position: relative;
  }

  label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    color: #444;
    font-size: 14px;
  }

  /* Inputs */
  input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 15px;
    transition: all 0.3s ease;
    background: #fafafa;
  }

  input:hover {
    border-color: #bdbdbd;
    background: #fff;
  }

  /* Focus state (ACCESSIBILITY) */
  input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.2);
    background: #fff;
  }

  /* Error state */
  input.error-input {
    border-color: #f44336;
    background: #fff5f5;
  }

  input.error-input:focus {
    box-shadow: 0 0 0 3px rgba(244, 67, 54, 0.2);
  }

  /* Success state */
  input.success-input {
    border-color: #667eea;
    background: #f8fff8;
  }

  /* Error message */
  .error {
    color: #f44336;
    font-size: 12px;
    margin-top: 5px;
    display: none;
    padding-left: 2px;
  }

  .error.show {
    display: block;
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  /* Password wrapper */
  .password-wrapper {
    display: flex;
    gap: 0;
    position: relative;
  }

  .password-wrapper input {
    flex: 1;
    border-radius: 8px 0 0 8px;
    border-right: none;
  }

  .password-wrapper input:focus {
    border-right: none;
  }

  .password-wrapper input:focus + .toggle-btn {
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.2);
  }

  .toggle-btn {
    background: #f5f5f5;
    border: 2px solid #e0e0e0;
    border-left: none;
    padding: 0 14px;
    cursor: pointer;
    border-radius: 0 8px 8px 0;
    font-size: 18px;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .toggle-btn:hover {
    background: #e8e8e8;
  }

  .toggle-btn:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.2);
  }

  .toggle-btn:active {
    transform: scale(0.95);
  }

  /* Checklist */
  .checklist {
    background: #f9f9f9;
    padding: 15px;
    border-radius: 10px;
    margin: 20px 0;
    font-size: 14px;
    border: 1px solid #eee;
  }

  .checklist p {
    margin: 0 0 10px 0;
    font-weight: 600;
    color: #555;
  }

  .checklist ul {
    padding-left: 0;
    margin: 0;
    list-style: none;
  }

  .checklist li {
    padding: 4px 0;
    transition: color 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .checklist li::before {
    content: "○";
    font-size: 12px;
    color: #999;
    transition: all 0.3s ease;
  }

  .checklist li.valid {
    color: #667eea;
  }

  .checklist li.valid::before {
    content: "✓";
    color: #667eea;
    font-weight: bold;
  }

  .checklist li.invalid {
    color: #667eea;
  }

  .checklist li.invalid::before {
    content: "✗";
    color: #667eea;
  }

  /* Submit Button */
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    transition: all 0.3s ease;
    margin-top: 10px;
    position: relative;
    overflow: hidden;
  }

  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(26, 26, 26, 0.2);
  }

  .submit-btn:active {
    transform: translateY(0);
  }

  .submit-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .submit-btn:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.2);
  }

  /* Success Message */
  .success-message {
    display: none;
    text-align: center;
    padding: 30px;
    animation: fadeIn 0.5s ease;
  }

  .success-message.show {
    display: block;
  }

  .success-message .icon {
    font-size: 60px;
    margin-bottom: 15px;
  }

  .success-message h3 {
    color: #667eea;
    margin-bottom: 10px;
    font-size: 24px;
  }

  .success-message p {
    color: #666;
    margin-bottom: 20px;
  }

  .success-message .reset-btn {
    padding: 12px 30px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    transition: all 0.3s ease;
  }

  .success-message .reset-btn:hover {
    background: #667eea;
    transform: translateY(-2px);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Hide form when success */
  .form.hidden {
    display: none;
  }

  /* Required asterisk */
  .required {
    color: #f44336;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .container {
      padding: 30px 20px;
    }

    h2 {
      font-size: 24px;
    }
  }
</style>

<body>

<div class="container">
  <!-- Success Message (hidden by default) -->
  <div class="success-message" id="success-message" role="alert" aria-live="polite">
    <div class="icon">🎉</div>
    <h3>Account Created!</h3>
    <p>Your account has been successfully created. Welcome aboard!</p>
    <button type="button" class="reset-btn" onclick="resetForm()">Create Another Account</button>
  </div>

  <form class="form" id="signup-form" aria-labelledby="form-title" novalidate>

    <h2 id="form-title">Create Account</h2>
    <p class="subtitle">Fill in your details to get started</p>

    <!-- Progress Bar -->
    <div class="progress-label" id="progress-label">0% Complete</div>
    <div class="progress-container" aria-hidden="true">
      <div class="progress-bar" id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
    </div>

    <!-- Full Name -->
    <div class="form-group">
      <label for="fullname">Full Name <span class="required" aria-hidden="true">*</span></label>
      <input 
        type="text" 
        id="fullname" 
        name="fullname" 
        placeholder="Enter your full name"
        required 
        aria-required="true"
        aria-describedby="fullname-error"
        autocomplete="name"
      >
      <small class="error" id="fullname-error" role="alert"></small>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label for="email">Email <span class="required" aria-hidden="true">*</span></label>
      <input 
        type="email" 
        id="email" 
        name="email" 
        placeholder="your@email.com"
        required 
        aria-required="true"
        aria-describedby="email-error"
        autocomplete="email"
      >
      <small class="error" id="email-error" role="alert"></small>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label for="password">Password <span class="required" aria-hidden="true">*</span></label>

      <div class="password-wrapper">
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Create a strong password"
          required 
          aria-required="true"
          aria-describedby="password-error password-hints"
          autocomplete="new-password"
        >
        <button 
          type="button" 
          class="toggle-btn" 
          id="toggle-btn"
          aria-label="Show password"
          aria-pressed="false"
        >
          👁
        </button>
      </div>

      <small class="error" id="password-error" role="alert"></small>
    </div>

    <!-- Confirm Password -->
    <div class="form-group">
      <label for="confirm">Confirm Password <span class="required" aria-hidden="true">*</span></label>
      <input 
        type="password" 
        id="confirm" 
        name="confirm" 
        placeholder="Confirm your password"
        required 
        aria-required="true"
        aria-describedby="confirm-error"
        autocomplete="new-password"
      >
      <small class="error" id="confirm-error" role="alert"></small>
    </div>

    <!-- Checklist -->
    <div class="checklist" id="password-hints" aria-live="polite">
      <p>Password must contain:</p>
      <ul>
        <li id="check-length">At least 8 characters</li>
        <li id="check-upper">One uppercase letter</li>
        <li id="check-number">One number</li>
      </ul>
    </div>

    <!-- Submit -->
    <button type="submit" class="submit-btn" id="submit-btn">
      Create Account
    </button>

  </form>
</div>

<script>
  // Elements
  const form = document.getElementById("signup-form");
  const passwordInput = document.getElementById("password");
  const confirmInput = document.getElementById("confirm");
  const toggleBtn = document.getElementById("toggle-btn");
  const progressBar = document.getElementById("progress-bar");
  const progressLabel = document.getElementById("progress-label");
  const submitBtn = document.getElementById("submit-btn");
  const successMessage = document.getElementById("success-message");

  const nameInput = document.getElementById("fullname");
  const emailInput = document.getElementById("email");

  // Checklist items
  const checkLength = document.getElementById("check-length");
  const checkUpper = document.getElementById("check-upper");
  const checkNumber = document.getElementById("check-number");

  // Error elements
  const nameError = document.getElementById("fullname-error");
  const emailError = document.getElementById("email-error");
  const passwordError = document.getElementById("password-error");
  const confirmError = document.getElementById("confirm-error");

  // Toggle password visibility
  toggleBtn.addEventListener("click", () => {
    const isVisible = passwordInput.type === "text";

    if (isVisible) {
      passwordInput.type = "password";
      confirmInput.type = "password";
      toggleBtn.setAttribute("aria-label", "Show password");
      toggleBtn.setAttribute("aria-pressed", "false");
      toggleBtn.textContent = "👁";
    } else {
      passwordInput.type = "text";
      confirmInput.type = "text";
      toggleBtn.setAttribute("aria-label", "Hide password");
      toggleBtn.setAttribute("aria-pressed", "true");
      toggleBtn.textContent = "🙈";
    }
  });

  // Show error
  function showError(input, errorEl, message) {
    errorEl.textContent = message;
    errorEl.classList.add("show");
    input.classList.add("error-input");
    input.classList.remove("success-input");
    input.setAttribute("aria-invalid", "true");
  }

  // Clear error
  function clearError(input, errorEl) {
    errorEl.textContent = "";
    errorEl.classList.remove("show");
    input.classList.remove("error-input");
    input.setAttribute("aria-invalid", "false");
  }

  // Show success
  function showSuccess(input) {
    input.classList.add("success-input");
  }

  // Validate name
  function validateName() {
    const value = nameInput.value.trim();

    if (value.length === 0) {
      clearError(nameInput, nameError);
      nameInput.classList.remove("success-input");
      return false;
    }

    if (value.length < 2) {
      showError(nameInput, nameError, "Name must be at least 2 characters long.");
      return false;
    }

    if (!/^[a-zA-Z\s'-]+$/.test(value)) {
      showError(nameInput, nameError, "Name can only contain letters, spaces, hyphens and apostrophes.");
      return false;
    }

    clearError(nameInput, nameError);
    showSuccess(nameInput);
    return true;
  }

  // Validate email
  function validateEmail() {
    const value = emailInput.value.trim();

    if (value.length === 0) {
      clearError(emailInput, emailError);
      emailInput.classList.remove("success-input");
      return false;
    }

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(value)) {
      showError(emailInput, emailError, "Please enter a valid email address.");
      return false;
    }

    clearError(emailInput, emailError);
    showSuccess(emailInput);
    return true;
  }

  // Validate password
  function validatePassword() {
    const password = passwordInput.value;

    const hasLength = password.length >= 8;
    const hasUpper = /[A-Z]/.test(password);
    const hasNumber = /[0-9]/.test(password);
    const hasLower = /[a-z]/.test(password);

    // Update checklist UI
    updateChecklistItem(checkLength, hasLength);
    updateChecklistItem(checkUpper, hasUpper);
    updateChecklistItem(checkNumber, hasNumber);

    if (password.length === 0) {
      clearError(passwordInput, passwordError);
      passwordInput.classList.remove("success-input");
      return false;
    }

    if (!hasLength) {
      showError(passwordInput, passwordError, "Password must be at least 8 characters long.");
      return false;
    }

    if (!hasUpper) {
      showError(passwordInput, passwordError, "Password must contain at least one uppercase letter.");
      return false;
    }

    if (!hasNumber) {
      showError(passwordInput, passwordError, "Password must contain at least one number.");
      return false;
    }

    if (!hasLower) {
      showError(passwordInput, passwordError, "Password must contain at least one lowercase letter.");
      return false;
    }

    clearError(passwordInput, passwordError);
    showSuccess(passwordInput);
    return true;
  }

  // Update checklist item
  function updateChecklistItem(el, isValid) {
    el.classList.remove("valid", "invalid");
    if (isValid) {
      el.classList.add("valid");
    } else if (passwordInput.value.length > 0) {
      el.classList.add("invalid");
    }
  }

  // Validate confirm password
  function validateConfirm() {
    const password = passwordInput.value;
    const confirm = confirmInput.value;

    if (confirm.length === 0) {
      clearError(confirmInput, confirmError);
      confirmInput.classList.remove("success-input");
      return false;
    }

    if (password !== confirm) {
      showError(confirmInput, confirmError, "Passwords do not match.");
      return false;
    }

    clearError(confirmInput, confirmError);
    showSuccess(confirmInput);
    return true;
  }

  // Update progress bar
  function updateProgress() {
    let progress = 0;
    let completed = 0;
    const total = 4;

    // Name
    if (nameInput.value.trim().length >= 2 && /^[a-zA-Z\s'-]+$/.test(nameInput.value.trim())) {
      progress += 25;
      completed++;
    }

    // Email
    if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value.trim())) {
      progress += 25;
      completed++;
    }

    // Password rules
    const password = passwordInput.value;
    const hasLength = password.length >= 8;
    const hasUpper = /[A-Z]/.test(password);
    const hasNumber = /[0-9]/.test(password);
    const hasLower = /[a-z]/.test(password);

    if (hasLength && hasUpper && hasNumber && hasLower) {
      progress += 25;
      completed++;
    }

    // Confirm password
    if (password && password === confirmInput.value) {
      progress += 25;
      completed++;
    }

    // Update progress bar
    progressBar.style.width = progress + "%";
    progressBar.setAttribute("aria-valuenow", progress);
    progressLabel.textContent = progress + "% Complete";

    if (progress === 100) {
      progressBar.classList.add("complete");
      progressLabel.textContent = "✓ All fields valid!";
      progressLabel.style.color = "#4CAF50";
      progressLabel.style.fontWeight = "600";
    } else {
      progressBar.classList.remove("complete");
      progressLabel.style.color = "#666";
      progressLabel.style.fontWeight = "normal";
    }

    return completed === total;
  }

  // Main validation function
  function validateForm() {
    validateName();
    validateEmail();
    validatePassword();
    validateConfirm();
    updateProgress();
  }

  // Event listeners for real-time validation
  nameInput.addEventListener("input", () => {
    validateName();
    updateProgress();
  });

  nameInput.addEventListener("blur", validateName);

  emailInput.addEventListener("input", () => {
    validateEmail();
    updateProgress();
  });

  emailInput.addEventListener("blur", validateEmail);

  passwordInput.addEventListener("input", () => {
    validatePassword();
    validateConfirm(); // Re-check confirm when password changes
    updateProgress();
  });

  passwordInput.addEventListener("blur", validatePassword);

  confirmInput.addEventListener("input", () => {
    validateConfirm();
    updateProgress();
  });

  confirmInput.addEventListener("blur", validateConfirm);

  // Form submission
  form.addEventListener("submit", (e) => {
    e.preventDefault();

    // Validate all fields
    const isNameValid = validateName();
    const isEmailValid = validateEmail();
    const isPasswordValid = validatePassword();
    const isConfirmValid = validateConfirm();

    if (isNameValid && isEmailValid && isPasswordValid && isConfirmValid) {
      // Simulate API call
      submitBtn.disabled = true;
      submitBtn.textContent = "Creating Account...";

      setTimeout(() => {
        form.classList.add("hidden");
        successMessage.classList.add("show");

        // Reset button for next time
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Account";
      }, 1500);
    } else {
      // Focus first invalid field
      const firstInvalid = form.querySelector(".error-input");
      if (firstInvalid) {
        firstInvalid.focus();
      }
    }
  });

  // Reset form function
  function resetForm() {
    form.reset();
    form.classList.remove("hidden");
    successMessage.classList.remove("show");

    // Clear all validation states
    [nameInput, emailInput, passwordInput, confirmInput].forEach(input => {
      input.classList.remove("error-input", "success-input");
      input.setAttribute("aria-invalid", "false");
    });

    [nameError, emailError, passwordError, confirmError].forEach(error => {
      error.textContent = "";
      error.classList.remove("show");
    });

    [checkLength, checkUpper, checkNumber].forEach(item => {
      item.classList.remove("valid", "invalid");
    });

    progressBar.style.width = "0%";
    progressBar.setAttribute("aria-valuenow", "0");
    progressLabel.textContent = "0% Complete";
    progressLabel.style.color = "#666";
    progressBar.classList.remove("complete");

    // Reset password visibility
    passwordInput.type = "password";
    confirmInput.type = "password";
    toggleBtn.setAttribute("aria-label", "Show password");
    toggleBtn.setAttribute("aria-pressed", "false");
    toggleBtn.textContent = "👁";
  }

  // Make resetForm globally accessible
  window.resetForm = resetForm;
</script>

</body>
</html>
