<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datepicker UI</title>
<base target="_blank">
</head>
<style>
  /* Reset */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* Body */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #FFBF 0%, #AB8000 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* Datepicker Container */
  .datepicker {
    width: 380px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
    animation: slideUp 0.4s ease-out;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Selected Date Display */
  .selected-date-display {
    background: linear-gradient(135deg, #FFBF 0%, #AB8000 100%);
    color: #fff;
    padding: 30px;
    text-align: center;
  }

  .selected-date-display .year {
    font-size: 16px;
    opacity: 0.9;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .selected-date-display .day-month {
    font-size: 36px;
    font-weight: 300;
    margin-top: 5px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    color: #333;
    padding: 18px 20px;
    border-bottom: 1px solid #eee;
  }

  .header h2 {
    font-size: 18px;
    font-weight: 600;
    color: #333;
    min-width: 140px;
    text-align: center;
  }

  .header button {
    background: #f5f5f5;
    border: none;
    color: #333;
    font-size: 18px;
    cursor: pointer;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }

  .header button:hover {
    background: #AB8000;
    color: #fff;
    transform: scale(1.1);
  }

  .header button:active {
    transform: scale(0.95);
  }

  .header button:focus {
    outline: 2px solid #AB8000;
    outline-offset: 2px;
  }

  /* Days of Week */
  .days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: #f8f9fa;
    text-align: center;
    padding: 12px 15px;
    font-weight: 600;
    font-size: 13px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Dates Grid */
  .dates {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 10px 15px 20px;
    gap: 4px;
  }

  /* Date Cells */
  .dates .date-cell {
    text-align: center;
    padding: 10px 5px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s ease;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid transparent;
  }

  /* Empty cells */
  .dates .empty {
    background: transparent;
    cursor: default;
    pointer-events: none;
  }

  /* Hover */
  .dates .date-cell:not(.empty):not(.selected):hover {
    background: #e8e8ff;
    color: #AB8000;
    transform: scale(1.1);
  }

  /* Today Highlight */
  .dates .today {
    background: linear-gradient(135deg, #FFBF 0%, #AB8000 100%);
    color: #fff;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(171, 128, 0, 0.2);
  }

  .dates .today:hover {
    background: linear-gradient(135deg, #FFBF 0%, #AB8000 100%);
    color: #fff;
  }

  /* Selected Date */
  .dates .selected {
    background: #AB8000;
    color: #fff;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(171, 128, 0, 0.2);
  }

  .dates .selected:hover {
    background: #AB8000;
    color: #fff;
  }

  /* Other month dates */
  .dates .other-month {
    color: #ccc;
  }

  .dates .other-month:hover {
    background: #f5f5f5;
    color: #999;
  }

  /* Footer */
  .footer {
    display: flex;
    justify-content: space-between;
    padding: 0 20px 20px;
    gap: 10px;
  }

  .footer button {
    flex: 1;
    padding: 10px 16px;
    border: 2px solid #AB8000;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s ease;
  }

  .footer .btn-today {
    background: #AB8000;
    color: #fff;
  }

  .footer .btn-today:hover {
    background: #AB8000;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(171, 128, 0, 0.2);
  }

  .footer .btn-clear {
    background: transparent;
    color: #AB8000;
  }

  .footer .btn-clear:hover {
    background: #f0f0ff;
  }

  .footer button:focus {
    outline: 2px solid #AB8000;
    outline-offset: 2px;
  }

  /* Input wrapper for integration */
  .input-wrapper {
    margin-bottom: 20px;
    text-align: center;
  }

  .input-wrapper label {
    display: block;
    color: #fff;
    margin-bottom: 10px;
    font-size: 16px;
  }

  .input-wrapper input {
    padding: 12px 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 16px;
    text-align: center;
    width: 250px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .input-wrapper input::placeholder {
    color: rgba(255,255,255,0.7);
  }

  .input-wrapper input:focus {
    outline: none;
    border-color: #fff;
    background: rgba(255,255,255,0.25);
  }

  /* Responsive */
  @media (max-width: 450px) {
    .datepicker {
      width: 100%;
      max-width: 350px;
    }

    .dates .date-cell {
      padding: 8px 3px;
      font-size: 13px;
    }

    .selected-date-display .day-month {
      font-size: 28px;
    }
  }
</style>
<body>

  <div style="display: flex; flex-direction: column; align-items: center;">
    <!-- Input field showing integration example -->
    <div class="input-wrapper">
      <label for="date-input">📅 Select a Date</label>
      <input type="text" id="date-input" placeholder="Click to select date" readonly>
    </div>

    <div class="datepicker" id="datepicker">
      <!-- Selected Date Display -->
      <div class="selected-date-display" id="selected-display">
        <div class="year" id="display-year">2026</div>
        <div class="day-month" id="display-day-month">Select a date</div>
      </div>

      <!-- Header -->
      <div class="header">
        <button id="prev-btn" aria-label="Previous month">&lt;</button>
        <h2 id="month-year">April 2026</h2>
        <button id="next-btn" aria-label="Next month">&gt;</button>
      </div>

      <!-- Days of Week -->
      <div class="days">
        <div>Sun</div>
        <div>Mon</div>
        <div>Tue</div>
        <div>Wed</div>
        <div>Thu</div>
        <div>Fri</div>
        <div>Sat</div>
      </div>

      <!-- Dates -->
      <div class="dates" id="dates-grid">
        <!-- Generated by JavaScript -->
      </div>

      <!-- Footer -->
      <div class="footer">
        <button type="button" class="btn-today" id="btn-today">Today</button>
        <button type="button" class="btn-clear" id="btn-clear">Clear</button>
      </div>
    </div>
  </div>

<script>
  // ================= DATEPICKER LOGIC =================

  const monthNames = [
    "January", "February", "March", "April", "May", "June",
    "July", "August", "September", "October", "November", "December"
  ];

  const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

  let currentDate = new Date();
  let displayedMonth = currentDate.getMonth();
  let displayedYear = currentDate.getFullYear();
  let selectedDate = null;

  // DOM Elements
  const datesGrid = document.getElementById("dates-grid");
  const monthYearEl = document.getElementById("month-year");
  const prevBtn = document.getElementById("prev-btn");
  const nextBtn = document.getElementById("next-btn");
  const todayBtn = document.getElementById("btn-today");
  const clearBtn = document.getElementById("btn-clear");
  const displayYear = document.getElementById("display-year");
  const displayDayMonth = document.getElementById("display-day-month");
  const dateInput = document.getElementById("date-input");

  // Get days in month
  function getDaysInMonth(year, month) {
    return new Date(year, month + 1, 0).getDate();
  }

  // Get first day of month (0 = Sunday)
  function getFirstDayOfMonth(year, month) {
    return new Date(year, month, 1).getDay();
  }

  // Format date for display
  function formatDate(date) {
    const d = date.getDate();
    const m = monthNames[date.getMonth()];
    const y = date.getFullYear();
    const dayName = dayNames[date.getDay()];
    return { day: d, month: m, year: y, dayName: dayName };
  }

  // Format date for input (MM/DD/YYYY)
  function formatDateInput(date) {
    const d = String(date.getDate()).padStart(2, '0');
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const y = date.getFullYear();
    return `${m}/${d}/${y}`;
  }

  // Check if two dates are the same day
  function isSameDay(date1, date2) {
    return date1.getDate() === date2.getDate() &&
           date1.getMonth() === date2.getMonth() &&
           date1.getFullYear() === date2.getFullYear();
  }

  // Check if date is today
  function isToday(date) {
    const today = new Date();
    return isSameDay(date, today);
  }

  // Render calendar
  function renderCalendar() {
    datesGrid.innerHTML = "";

    const daysInMonth = getDaysInMonth(displayedYear, displayedMonth);
    const firstDay = getFirstDayOfMonth(displayedYear, displayedMonth);

    // Days from previous month
    const prevMonthDays = getDaysInMonth(displayedYear, displayedMonth - 1);
    for (let i = firstDay - 1; i >= 0; i--) {
      const day = prevMonthDays - i;
      const cell = document.createElement("div");
      cell.className = "date-cell other-month";
      cell.textContent = day;
      cell.setAttribute("aria-label", `Previous month, day ${day}`);
      datesGrid.appendChild(cell);
    }

    // Days of current month
    for (let day = 1; day <= daysInMonth; day++) {
      const cell = document.createElement("div");
      cell.className = "date-cell";
      cell.textContent = day;

      const cellDate = new Date(displayedYear, displayedMonth, day);

      // Check if today
      if (isToday(cellDate)) {
        cell.classList.add("today");
      }

      // Check if selected
      if (selectedDate && isSameDay(cellDate, selectedDate)) {
        cell.classList.add("selected");
      }

      cell.setAttribute("role", "button");
      cell.setAttribute("tabindex", "0");
      cell.setAttribute("aria-label", `${dayNames[cellDate.getDay()]}, ${monthNames[displayedMonth]} ${day}, ${displayedYear}`);

      // Click handler
      cell.addEventListener("click", () => selectDate(cellDate));

      // Keyboard handler
      cell.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          selectDate(cellDate);
        }
      });

      datesGrid.appendChild(cell);
    }

    // Days from next month to fill grid
    const totalCells = firstDay + daysInMonth;
    const remainingCells = 42 - totalCells; // 6 rows * 7 cols = 42

    for (let day = 1; day <= remainingCells; day++) {
      const cell = document.createElement("div");
      cell.className = "date-cell other-month";
      cell.textContent = day;
      cell.setAttribute("aria-label", `Next month, day ${day}`);
      datesGrid.appendChild(cell);
    }

    // Update header
    monthYearEl.textContent = `${monthNames[displayedMonth]} ${displayedYear}`;
  }

  // Select date
  function selectDate(date) {
    selectedDate = new Date(date);
    const formatted = formatDate(selectedDate);

    displayYear.textContent = formatted.year;
    displayDayMonth.textContent = `${formatted.dayName}, ${formatted.month} ${formatted.day}`;

    dateInput.value = formatDateInput(selectedDate);

    // If selected date is in a different month, navigate to it
    if (date.getMonth() !== displayedMonth || date.getFullYear() !== displayedYear) {
      displayedMonth = date.getMonth();
      displayedYear = date.getFullYear();
    }

    renderCalendar();
  }

  // Go to previous month
  prevBtn.addEventListener("click", () => {
    displayedMonth--;
    if (displayedMonth < 0) {
      displayedMonth = 11;
      displayedYear--;
    }
    renderCalendar();
  });

  // Go to next month
  nextBtn.addEventListener("click", () => {
    displayedMonth++;
    if (displayedMonth > 11) {
      displayedMonth = 0;
      displayedYear++;
    }
    renderCalendar();
  });

  // Go to today
  todayBtn.addEventListener("click", () => {
    const today = new Date();
    selectDate(today);
  });

  // Clear selection
  clearBtn.addEventListener("click", () => {
    selectedDate = null;
    displayYear.textContent = new Date().getFullYear();
    displayDayMonth.textContent = "Select a date";
    dateInput.value = "";
    renderCalendar();
  });

  // Keyboard navigation for header buttons
  [prevBtn, nextBtn, todayBtn, clearBtn].forEach(btn => {
    btn.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        btn.click();
      }
    });
  });

  // Input click handler
  dateInput.addEventListener("click", () => {
    document.getElementById("datepicker").scrollIntoView({ behavior: "smooth", block: "center" });
  });

  // Initialize
  renderCalendar();

  // Select today's date by default
  selectDate(new Date());
</script>

</body>
</html>
