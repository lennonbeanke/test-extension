<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherNow | Real-Time Weather</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<base target="_blank">
</head>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --primary: #c79b8b;
    --secondary: #723b00;
    --accent: #4a2900;
    --dark: #4f1600;
    --card-bg: rgba(189, 132, 181, 0.66);
    --text: #fff;
    --text-muted: rgb(255, 255, 255);
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a0f0a 0%, #3d1f14 30%, #6b3418 60%, #8b4513 100%);
    min-height: 100vh;
    color: var(--text);
    overflow-x: hidden;
  }

  /* Animated background particles */
  .bg-animation {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .bg-animation .circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 107, 53, 0.08);
    animation: float 20s infinite ease-in-out;
  }

  .bg-animation .circle:nth-child(1) {
    width: 300px;
    height: 300px;
    top: -100px;
    left: -100px;
    animation-delay: 0s;
  }

  .bg-animation .circle:nth-child(2) {
    width: 200px;
    height: 200px;
    top: 50%;
    right: -50px;
    animation-delay: 5s;
  }

  .bg-animation .circle:nth-child(3) {
    width: 150px;
    height: 150px;
    bottom: 10%;
    left: 20%;
    animation-delay: 10s;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -30px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.9); }
  }

  /* Header */
  .header {
    position: relative;
    z-index: 10;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.2);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 24px;
    font-weight: 700;
  }

  .logo i {
    font-size: 28px;
    color: var(--primary);
  }

  .location-btn {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 25px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
  }

  .location-btn:hover {
    background: rgba(255,255,255,0.2);
    transform: translateY(-2px);
  }

  .location-btn.loading {
    opacity: 0.6;
    pointer-events: none;
  }

  /* Search Bar */
  .search-container {
    position: relative;
    z-index: 10;
    max-width: 600px;
    margin: 20px auto 30px;
    padding: 0 20px;
  }

  .search-box {
    position: relative;
    display: flex;
    gap: 10px;
  }

  .search-box input {
    flex: 1;
    padding: 15px 20px 15px 50px;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 30px;
    background: var(--card-bg);
    color: var(--text);
    font-size: 16px;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
  }

  .search-box input::placeholder {
    color: var(--text-muted);
  }

  .search-box input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
  }

  .search-box .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 18px;
  }

  .search-box button {
    padding: 15px 30px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border: none;
    border-radius: 30px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .search-box button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4);
  }

  .search-box button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* Search Suggestions */
  .suggestions {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    margin-top: 8px;
    background: rgba(45, 27, 20, 0.95);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    max-height: 300px;
    overflow-y: auto;
    display: none;
    backdrop-filter: blur(20px);
    z-index: 100;
  }

  .suggestions.show {
    display: block;
  }

  .suggestion-item {
    padding: 12px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s ease;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .suggestion-item:last-child {
    border-bottom: none;
  }

  .suggestion-item:hover {
    background: rgba(255, 107, 53, 0.2);
  }

  .suggestion-item i {
    color: var(--primary);
    font-size: 14px;
  }

  .suggestion-item .city-name {
    font-weight: 500;
  }

  .suggestion-item .country-name {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
  }

  /* Main Weather Card */
  .main-weather {
    position: relative;
    z-index: 10;
    max-width: 900px;
    margin: 0 auto 30px;
    padding: 0 20px;
  }

  .weather-card {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 40px;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: fadeInUp 0.6s ease-out;
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .weather-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 30px;
  }

  .location-info h2 {
    font-size: 32px;
    margin-bottom: 5px;
  }

  .location-info .date-time {
    color: var(--text-muted);
    font-size: 14px;
  }

  .weather-icon-main {
    font-size: 80px;
    animation: pulse 2s infinite ease-in-out;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .temperature-display {
    text-align: center;
    margin: 20px 0;
  }

  .temp-big {
    font-size: 96px;
    font-weight: 300;
    line-height: 1;
    background: linear-gradient(135deg, #fff, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .temp-big span {
    font-size: 48px;
    vertical-align: super;
  }

  .weather-desc {
    text-align: center;
    font-size: 20px;
    color: var(--text-muted);
    margin-bottom: 30px;
    text-transform: capitalize;
  }

  /* Weather Details Grid */
  .details-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-top: 30px;
  }

  .detail-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    transition: all 0.3s ease;
  }

  .detail-card:hover {
    background: rgba(255,255,255,0.1);
    transform: translateY(-5px);
  }

  .detail-card i {
    font-size: 24px;
    color: var(--primary);
    margin-bottom: 10px;
  }

  .detail-card .label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 5px;
  }

  .detail-card .value {
    font-size: 20px;
    font-weight: 600;
  }

  /* Forecast Section */
  .forecast-section {
    position: relative;
    z-index: 10;
    max-width: 900px;
    margin: 0 auto 30px;
    padding: 0 20px;
  }

  .section-title {
    font-size: 22px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .forecast-container {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 12px;
  }

  .forecast-card {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px 15px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    animation: fadeInUp 0.5s ease-out both;
  }

  .forecast-card:nth-child(1) { animation-delay: 0.05s; }
  .forecast-card:nth-child(2) { animation-delay: 0.1s; }
  .forecast-card:nth-child(3) { animation-delay: 0.15s; }
  .forecast-card:nth-child(4) { animation-delay: 0.2s; }
  .forecast-card:nth-child(5) { animation-delay: 0.25s; }
  .forecast-card:nth-child(6) { animation-delay: 0.3s; }
  .forecast-card:nth-child(7) { animation-delay: 0.35s; }

  .forecast-card:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.15);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  .forecast-card .day {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 10px;
    color: var(--text-muted);
  }

  .forecast-card .forecast-icon {
    font-size: 36px;
    margin: 10px 0;
  }

  .forecast-card .forecast-temp {
    font-size: 18px;
    font-weight: 600;
  }

  .forecast-card .forecast-temp .high {
    color: #ff9800;
  }

  .forecast-card .forecast-temp .low {
    color: var(--text-muted);
    font-size: 14px;
  }

  /* Hourly Forecast */
  .hourly-section {
    position: relative;
    z-index: 10;
    max-width: 900px;
    margin: 0 auto 40px;
    padding: 0 20px;
  }

  .hourly-scroll {
    display: flex;
    gap: 15px;
    overflow-x: auto;
    padding: 10px 0 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--primary) transparent;
  }

  .hourly-scroll::-webkit-scrollbar {
    height: 6px;
  }

  .hourly-scroll::-webkit-scrollbar-track {
    background: transparent;
  }

  .hourly-scroll::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 3px;
  }

  .hourly-card {
    min-width: 80px;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 15px 10px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
  }

  .hourly-card:hover {
    background: rgba(255,255,255,0.15);
    transform: scale(1.05);
  }

  .hourly-card .time {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .hourly-card .hour-icon {
    font-size: 24px;
    margin: 5px 0;
  }

  .hourly-card .hour-temp {
    font-size: 16px;
    font-weight: 600;
  }

  /* Loading State */
  .loading-container {
    display: none;
    justify-content: center;
    align-items: center;
    padding: 60px;
  }

  .loading-container.show {
    display: flex;
  }

  .spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255,255,255,0.1);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Error State */
  .error-container {
    display: none;
    text-align: center;
    padding: 40px;
    background: rgba(244, 67, 54, 0.1);
    border: 1px solid rgba(244, 67, 54, 0.3);
    border-radius: 16px;
    margin: 20px auto;
    max-width: 600px;
  }

  .error-container.show {
    display: block;
  }

  .error-container i {
    font-size: 48px;
    color: #f44336;
    margin-bottom: 15px;
  }

  .error-container h3 {
    margin-bottom: 10px;
  }

  .error-container p {
    color: var(--text-muted);
  }

  /* Footer */
  .footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 30px;
    color: var(--text-muted);
    font-size: 13px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .footer a {
    color: var(--primary);
    text-decoration: none;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .header {
      padding: 15px 20px;
    }

    .logo {
      font-size: 18px;
    }

    .location-btn span {
      display: none;
    }

    .weather-card {
      padding: 25px;
    }

    .temp-big {
      font-size: 64px;
    }

    .details-grid {
      grid-template-columns: repeat(2, 1fr);
    }

    .forecast-container {
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .forecast-card:nth-child(5),
    .forecast-card:nth-child(6),
    .forecast-card:nth-child(7) {
      display: none;
    }
  }

  @media (max-width: 480px) {
    .search-box {
      flex-direction: column;
    }

    .search-box button {
      width: 100%;
    }

    .temp-big {
      font-size: 56px;
    }

    .forecast-container {
      grid-template-columns: repeat(3, 1fr);
    }

    .forecast-card:nth-child(4) {
      display: none;
    }
  }
</style>

<body>
  <!-- Background Animation -->
  <div class="bg-animation">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <i class="fas fa-cloud-sun"></i>
      <span>WeatherNow</span>
    </div>
    <button class="location-btn" id="location-btn" onclick="getUserLocation()">
      <i class="fas fa-location-arrow"></i>
      <span>Use My Location</span>
    </button>
  </header>

  <!-- Search -->
  <div class="search-container">
    <div class="search-box">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="city-input" placeholder="Search for a city..." autocomplete="off">
      <button id="search-btn" onclick="searchCity()">Search</button>
    </div>
    <div class="suggestions" id="suggestions"></div>
  </div>

  <!-- Loading -->
  <div class="loading-container" id="loading">
    <div class="spinner"></div>
  </div>

  <!-- Error -->
  <div class="error-container" id="error">
    <i class="fas fa-exclamation-circle"></i>
    <h3>Oops! Something went wrong</h3>
    <p id="error-message">Unable to fetch weather data. Please try again.</p>
  </div>

  <!-- Main Weather -->
  <div class="main-weather" id="weather-container" style="display: none;">
    <div class="weather-card">
      <div class="weather-header">
        <div class="location-info">
          <h2 id="city-name">--</h2>
          <div class="date-time" id="current-date">--</div>
        </div>
        <div class="weather-icon-main" id="weather-icon">⛅</div>
      </div>

      <div class="temperature-display">
        <div class="temp-big" id="temperature">--<span>°</span></div>
      </div>

      <div class="weather-desc" id="weather-description">--</div>

      <div class="details-grid">
        <div class="detail-card">
          <i class="fas fa-wind"></i>
          <div class="label">Wind</div>
          <div class="value" id="wind-speed">--</div>
        </div>
        <div class="detail-card">
          <i class="fas fa-tint"></i>
          <div class="label">Humidity</div>
          <div class="value" id="humidity">--</div>
        </div>
        <div class="detail-card">
          <i class="fas fa-eye"></i>
          <div class="label">Visibility</div>
          <div class="value" id="visibility">--</div>
        </div>
        <div class="detail-card">
          <i class="fas fa-gauge-high"></i>
          <div class="label">Pressure</div>
          <div class="value" id="pressure">--</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Hourly Forecast -->
  <div class="hourly-section" id="hourly-section" style="display: none;">
    <h3 class="section-title"><i class="fas fa-clock"></i> Hourly Forecast</h3>
    <div class="hourly-scroll" id="hourly-container">
      <!-- Generated by JS -->
    </div>
  </div>

  <!-- 7-Day Forecast -->
  <div class="forecast-section" id="forecast-section" style="display: none;">
    <h3 class="section-title"><i class="fas fa-calendar-alt"></i> 7-Day Forecast</h3>
    <div class="forecast-container" id="forecast-container">
      <!-- Generated by JS -->
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>Weather data provided by <a href="https://open-meteo.com/" target="_blank">Open-Meteo</a> • Built with ❤️</p>
  </footer>

  <script>
    // ================= WEATHER CODE MAPPING =================
    const weatherCodes = {
      0: { icon: '☀️', desc: 'Clear sky' },
      1: { icon: '🌤️', desc: 'Mainly clear' },
      2: { icon: '⛅', desc: 'Partly cloudy' },
      3: { icon: '☁️', desc: 'Overcast' },
      45: { icon: '🌫️', desc: 'Foggy' },
      48: { icon: '🌫️', desc: 'Depositing rime fog' },
      51: { icon: '🌦️', desc: 'Light drizzle' },
      53: { icon: '🌦️', desc: 'Moderate drizzle' },
      55: { icon: '🌧️', desc: 'Dense drizzle' },
      56: { icon: '🌨️', desc: 'Light freezing drizzle' },
      57: { icon: '🌨️', desc: 'Dense freezing drizzle' },
      61: { icon: '🌧️', desc: 'Slight rain' },
      63: { icon: '🌧️', desc: 'Moderate rain' },
      65: { icon: '🌧️', desc: 'Heavy rain' },
      66: { icon: '🌨️', desc: 'Light freezing rain' },
      67: { icon: '🌨️', desc: 'Heavy freezing rain' },
      71: { icon: '🌨️', desc: 'Slight snow' },
      73: { icon: '🌨️', desc: 'Moderate snow' },
      75: { icon: '❄️', desc: 'Heavy snow' },
      77: { icon: '🌨️', desc: 'Snow grains' },
      80: { icon: '🌦️', desc: 'Slight rain showers' },
      81: { icon: '🌧️', desc: 'Moderate rain showers' },
      82: { icon: '🌧️', desc: 'Violent rain showers' },
      85: { icon: '🌨️', desc: 'Slight snow showers' },
      86: { icon: '❄️', desc: 'Heavy snow showers' },
      95: { icon: '⛈️', desc: 'Thunderstorm' },
      96: { icon: '⛈️', desc: 'Thunderstorm with hail' },
      99: { icon: '⛈️', desc: 'Thunderstorm with heavy hail' }
    };

    function getWeatherInfo(code) {
      return weatherCodes[code] || { icon: '⛅', desc: 'Unknown' };
    }

    // ================= DOM ELEMENTS =================
    const cityInput = document.getElementById('city-input');
    const suggestionsEl = document.getElementById('suggestions');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error');
    const weatherContainer = document.getElementById('weather-container');
    const hourlySection = document.getElementById('hourly-section');
    const forecastSection = document.getElementById('forecast-section');
    const locationBtn = document.getElementById('location-btn');

    let currentLat = null;
    let currentLon = null;
    let currentCity = '';

    // ================= SEARCH WITH DEBOUNCE =================
    let searchTimeout;
    cityInput.addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      const query = e.target.value.trim();

      if (query.length < 2) {
        suggestionsEl.classList.remove('show');
        return;
      }

      searchTimeout = setTimeout(() => fetchCitySuggestions(query), 300);
    });

    cityInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        suggestionsEl.classList.remove('show');
        searchCity();
      }
    });

    // Close suggestions on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-container')) {
        suggestionsEl.classList.remove('show');
      }
    });

    // ================= FETCH CITY SUGGESTIONS =================
    async function fetchCitySuggestions(query) {
      try {
        const response = await fetch(
          `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5&language=en&format=json`
        );
        const data = await response.json();

        if (data.results) {
          displaySuggestions(data.results);
        } else {
          suggestionsEl.classList.remove('show');
        }
      } catch (error) {
        console.error('Suggestion error:', error);
      }
    }

    function displaySuggestions(results) {
      suggestionsEl.innerHTML = '';

      results.forEach(result => {
        const item = document.createElement('div');
        item.className = 'suggestion-item';
        item.innerHTML = `
          <i class="fas fa-map-marker-alt"></i>
          <span class="city-name">${result.name}</span>
          <span class="country-name">${result.country || ''}</span>
        `;
        item.addEventListener('click', () => {
          cityInput.value = result.name;
          suggestionsEl.classList.remove('show');
          currentLat = result.latitude;
          currentLon = result.longitude;
          currentCity = result.name;
          fetchWeather(result.latitude, result.longitude, result.name);
        });
        suggestionsEl.appendChild(item);
      });

      suggestionsEl.classList.add('show');
    }

    // ================= SEARCH CITY =================
    async function searchCity() {
      const query = cityInput.value.trim();
      if (!query) return;

      showLoading();

      try {
        const response = await fetch(
          `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=en&format=json`
        );
        const data = await response.json();

        if (data.results && data.results.length > 0) {
          const result = data.results[0];
          currentLat = result.latitude;
          currentLon = result.longitude;
          currentCity = result.name;
          await fetchWeather(result.latitude, result.longitude, result.name);
        } else {
          showError('City not found. Please try another search.');
        }
      } catch (error) {
        showError('Failed to search for city. Please check your connection.');
      }
    }

    // ================= GEOLOCATION =================
    function getUserLocation() {
      if (!navigator.geolocation) {
        showError('Geolocation is not supported by your browser.');
        return;
      }

      locationBtn.classList.add('loading');

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          currentLat = lat;
          currentLon = lon;

          // Reverse geocode to get city name
          try {
            const response = await fetch(
              `https://geocoding-api.open-meteo.com/v1/search?name=${lat},${lon}&count=1&language=en&format=json`
            );
            const data = await response.json();
            const cityName = data.results?.[0]?.name || 'Your Location';
            currentCity = cityName;
            await fetchWeather(lat, lon, cityName);
          } catch (error) {
            currentCity = 'Your Location';
            await fetchWeather(lat, lon, 'Your Location');
          }

          locationBtn.classList.remove('loading');
        },
        (error) => {
          locationBtn.classList.remove('loading');
          let message = 'Unable to retrieve your location.';
          if (error.code === 1) message = 'Location access denied. Please enable location permissions.';
          if (error.code === 2) message = 'Location unavailable. Please try again.';
          if (error.code === 3) message = 'Location request timed out.';
          showError(message);
        },
        { timeout: 10000, enableHighAccuracy: true }
      );
    }

    // ================= FETCH WEATHER DATA =================
    async function fetchWeather(lat, lon, cityName) {
      showLoading();

      try {
        // Fetch current weather + forecast
        const response = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,rain,showers,snowfall,weather_code,cloud_cover,pressure_msl,surface_pressure,wind_speed_10m,wind_direction_10m&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_sum&timezone=auto&forecast_days=8`
        );

        if (!response.ok) throw new Error('Weather API error');

        const data = await response.json();
        displayWeather(data, cityName);
        displayHourlyForecast(data.hourly);
        displayDailyForecast(data.daily);
        hideLoading();
      } catch (error) {
        console.error('Weather fetch error:', error);
        showError('Failed to fetch weather data. Please try again.');
      }
    }

    // ================= DISPLAY CURRENT WEATHER =================
    function displayWeather(data, cityName) {
      const current = data.current;
      const weatherInfo = getWeatherInfo(current.weather_code);

      document.getElementById('city-name').textContent = cityName;
      document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });

      document.getElementById('weather-icon').textContent = weatherInfo.icon;
      document.getElementById('temperature').innerHTML = `${Math.round(current.temperature_2m)}<span>°</span>`;
      document.getElementById('weather-description').textContent = weatherInfo.desc;

      document.getElementById('wind-speed').textContent = `${current.wind_speed_10m} km/h`;
      document.getElementById('humidity').textContent = `${current.relative_humidity_2m}%`;
      document.getElementById('visibility').textContent = `${Math.round(current.cloud_cover)}%`;
      document.getElementById('pressure').textContent = `${Math.round(current.pressure_msl)} hPa`;

      weatherContainer.style.display = 'block';
    }

    // ================= DISPLAY HOURLY FORECAST =================
    function displayHourlyForecast(hourly) {
      const container = document.getElementById('hourly-container');
      container.innerHTML = '';

      const now = new Date();
      const currentHour = now.getHours();

      // Show next 24 hours
      for (let i = 0; i < 24; i++) {
        const hourIndex = currentHour + i;
        if (hourIndex >= hourly.time.length) break;

        const time = new Date(hourly.time[hourIndex]);
        const temp = hourly.temperature_2m[hourIndex];
        const code = hourly.weather_code[hourIndex];
        const weatherInfo = getWeatherInfo(code);

        const card = document.createElement('div');
        card.className = 'hourly-card';
        card.innerHTML = `
          <div class="time">${i === 0 ? 'Now' : time.toLocaleTimeString('en-US', { hour: 'numeric', hour12: true })}</div>
          <div class="hour-icon">${weatherInfo.icon}</div>
          <div class="hour-temp">${Math.round(temp)}°</div>
        `;
        container.appendChild(card);
      }

      hourlySection.style.display = 'block';
    }

    // ================= DISPLAY DAILY FORECAST =================
    function displayDailyForecast(daily) {
      const container = document.getElementById('forecast-container');
      container.innerHTML = '';

      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

      for (let i = 1; i < Math.min(8, daily.time.length); i++) {
        const date = new Date(daily.time[i]);
        const dayName = i === 1 ? 'Tomorrow' : days[date.getDay()];
        const maxTemp = daily.temperature_2m_max[i];
        const minTemp = daily.temperature_2m_min[i];
        const code = daily.weather_code[i];
        const weatherInfo = getWeatherInfo(code);

        const card = document.createElement('div');
        card.className = 'forecast-card';
        card.innerHTML = `
          <div class="day">${dayName}</div>
          <div class="forecast-icon">${weatherInfo.icon}</div>
          <div class="forecast-temp">
            <span class="high">${Math.round(maxTemp)}°</span>
            <span class="low">${Math.round(minTemp)}°</span>
          </div>
        `;
        container.appendChild(card);
      }

      forecastSection.style.display = 'block';
    }

    // ================= UI HELPERS =================
    function showLoading() {
      loadingEl.classList.add('show');
      errorEl.classList.remove('show');
      weatherContainer.style.display = 'none';
      hourlySection.style.display = 'none';
      forecastSection.style.display = 'none';
    }

    function hideLoading() {
      loadingEl.classList.remove('show');
    }

    function showError(message) {
      loadingEl.classList.remove('show');
      document.getElementById('error-message').textContent = message;
      errorEl.classList.add('show');
    }

    // ================= INIT =================
    // Load default city (London) on page load
    window.addEventListener('DOMContentLoaded', () => {
      currentLat = 51.5074;
      currentLon = -0.1278;
      currentCity = 'London';
      fetchWeather(51.5074, -0.1278, 'London');
    });
  </script>
