<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Changelog Component</title>

<style>
  /* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Body */
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  display: flex;
  justify-content: center;
  padding: 20px;
}

/* Container */
.changelog {
  background: #fff;
  padding: 20px;
  width: 100%;
  max-width: 600px;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

/* Timeline */
.timeline {
  position: relative;
  margin-left: 20px;
  border-left: 2px solid #ccc;
}

/* Each Entry */
.entry {
  position: relative;
  margin-bottom: 20px;
  padding-left: 20px;
}

/* Dot (Positioning) */
.dot {
  position: absolute;
  left: -9px;
  top: 5px;
  width: 14px;
  height: 14px;
  background: #222;
  border-radius: 50%;
}

/* Content */
.content h3 {
  margin-bottom: 5px;
}

.content p {
  margin-bottom: 5px;
  color: #555;
}

/* Date */
.date {
  font-size: 0.9em;
  color: #999;
}

/* Responsive */
@media (max-width: 500px) {
  .changelog {
    padding: 15px;
  }

  .timeline {
    margin-left: 10px;
  }
}
</style>
</head>

<body>

  <main class="changelog">

    <h1>Changelog</h1>

    <div class="timeline">

      <div class="entry">
        <div class="dot"></div>
        <div class="content">
          <h3>Version 1.0</h3>
          <p>Initial release of the project.</p>
          <span class="date">April 2026</span>
        </div>
      </div>

      <div class="entry">
        <div class="dot"></div>
        <div class="content">
          <h3>Version 1.1</h3>
          <p>Added new features and improved performance.</p>
          <span class="date">May 2026</span>
        </div>
      </div>

      <div class="entry">
        <div class="dot"></div>
        <div class="content">
          <h3>Version 2.0</h3>
          <p>Major update with redesigned UI and bug fixes.</p>
          <span class="date">June 2026</span>
        </div>
      </div>

    </div>

  </main>

</body>
</html>
