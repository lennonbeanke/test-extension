<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datepicker UI</title>

  <link rel="stylesheet" href="style.css">
</head>
<Style>
  /* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Body */
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Datepicker Container */
.datepicker {
  width: 320px;
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  overflow: hidden;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #222;
  color: #fff;
  padding: 15px;
}

.header button {
  background: none;
  border: none;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
}

/* Days */
.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: #eee;
  text-align: center;
  padding: 10px 0;
  font-weight: bold;
}

/* Dates Grid */
.dates {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 10px;
  gap: 5px;
}

/* Date Cells */
.dates div {
  text-align: center;
  padding: 10px;
  border-radius: 5px;
  cursor: pointer;
}

/* Empty cells */
.empty {
  background: transparent;
}

/* Hover */
.dates div:hover {
  background: #ddd;
}

/* Today Highlight */
.today {
  background: #222;
  color: #fff;
  font-weight: bold;
}

/* Responsive */
@media (max-width: 400px) {
  .datepicker {
    width: 90%;
  }
}
</Style>
<body>

  <div class="datepicker">

    <!-- Header -->
    <div class="header">
      <button>&lt;</button>
      <h2>April 2026</h2>
      <button>&gt;</button>
    </div>

    <!-- Days of Week -->
    <div class="days">
      <div>Sun</div>
      <div>Mon</div>
      <div>Tue</div>
      <div>Wed</div>
      <div>Thu</div>
      <div>Fri</div>
      <div>Sat</div>
    </div>

    <!-- Dates -->
    <div class="dates">
      <div class="empty"></div>
      <div class="empty"></div>

      <div>1</div>
      <div>2</div>
      <div>3</div>
      <div>4</div>
      <div>5</div>

      <div>6</div>
      <div class="today">7</div>
      <div>8</div>
      <div>9</div>
      <div>10</div>
      <div>11</div>
      <div>12</div>

      <div>13</div>
      <div>14</div>
      <div>15</div>
      <div>16</div>
      <div>17</div>
      <div>18</div>
      <div>19</div>

      <div>20</div>
      <div>21</div>
      <div>22</div>
      <div>23</div>
      <div>24</div>
      <div>25</div>
      <div>26</div>

      <div>27</div>
      <div>28</div>
      <div>29</div>
      <div>30</div>

    </div>

  </div>

</body>
</html>
