<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Grid Gallery</title>
  <link rel="stylesheet" href="styles.css">
</head>
<Style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f5f5f5;
  padding: 20px;
}

.title {
  text-align: center;
  margin-bottom: 20px;
}

/* GRID CONTAINER */
.grid-container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-auto-rows: 200px;
  gap: 15px;
}

/* GRID ITEMS */
.item {
  overflow: hidden;
  border-radius: 12px;
}

.item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CUSTOM LAYOUT (LIKE MOCKUP STYLE) */
.item1 {
  grid-row: span 2;
}

.item4 {
  grid-row: span 2;
}

.item5 {
  grid-column: span 2;
}

/* RESPONSIVE DESIGN */
@media (max-width: 900px) {
  .grid-container {
    grid-template-columns: repeat(2, 1fr);
  }

  .item5 {
    grid-column: span 1;
  }
}

@media (max-width: 500px) {
  .grid-container {
    grid-template-columns: 1fr;
  }

  .item1,
  .item4 {
    grid-row: span 1;
  }
}
</Style>
<body>

  <h1 class="title">CSS Grid Image Layout</h1>

  <div class="grid-container">
    <div class="item item1">
      <img src="https://picsum.photos/600/800?1" alt="Foggy beach">
    </div>

    <div class="item item2">
      <img src="https://picsum.photos/600/400?2" alt="Living room">
    </div>

    <div class="item item3">
      <img src="https://picsum.photos/600/400?3" alt="Food table">
    </div>

    <div class="item item4">
      <img src="https://picsum.photos/600/800?4" alt="Red door building">
    </div>

    <div class="item item5">
      <img src="https://picsum.photos/600/400?5" alt="Apartments">
    </div>

    <div class="item item6">
      <img src="https://picsum.photos/600/400?6" alt="Beach view">
    </div>
  </div>

</body>
</html>
